name: Release Desktop Apps

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# tauri-action creates a GitHub Release on tag builds — needs write access.
permissions:
  contents: write

# Build every desktop target in ONE workflow (matrix) so tauri-action publishes a
# single, complete updater manifest (latest.json) covering all platforms. Splitting
# Windows/Linux into separate workflows makes each overwrite the other's latest.json.
jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential curl wget file libxdo-dev libssl-dev

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # Use the npm version pinned in package.json (packageManager).
      - run: corepack enable

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build, sign + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts so installed apps accept the update.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Tag push -> create/attach to one draft GitHub Release across both matrix
          # platforms, with signed updater artifacts (.sig) + a merged latest.json.
          # Manual run -> tagName empty, so it just builds (artifacts uploaded below).
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: 'Scalir ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true

      - name: Upload Windows installer artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: scalir-windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload Linux package artifacts
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: scalir-linux-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
