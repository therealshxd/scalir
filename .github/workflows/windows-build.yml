name: Build Windows Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# tauri-action creates a GitHub Release on tag builds — needs write access.
permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # Use the npm version pinned in package.json (packageManager).
      - run: corepack enable

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build app + installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a tag push -> create a draft GitHub Release with .msi + .exe attached.
          # On a manual run -> tagName is empty, so it just builds (artifact uploaded below).
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: 'Scalir ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: scalir-windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
