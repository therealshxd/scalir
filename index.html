<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      // Staging (scalir.shad.digital) serves the same build as production. Keep it out of search
      // indexes so it can't create duplicate-content competition with scalir.org.
      if (location.hostname === 'scalir.shad.digital') {
        var m = document.createElement('meta');
        m.name = 'robots';
        m.content = 'noindex, nofollow';
        document.head.appendChild(m);
      }
    </script>
    <link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180.png" />
    <meta name="theme-color" content="#0f1115" />
    <link rel="preconnect" href="https://analytics.scalir.org" crossorigin />
    <meta name="description" content="Free bulk image compressor — compress, resize and convert images online in your browser. JPG, PNG, WebP, AVIF, HEIC, GIF, TIFF, BMP. No uploads, no sign-up, completely private." />
    <link rel="canonical" href="https://scalir.org/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Scalir" />
    <meta property="og:title" content="Scalir — Free Bulk Image Compressor" />
    <meta property="og:description" content="Compress, resize and convert images in bulk — free, private, and entirely in your browser. No uploads, no sign-up." />
    <meta property="og:url" content="https://scalir.org/" />
    <meta property="og:image" content="https://scalir.org/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Scalir — free, private, in-browser bulk image compressor" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Scalir — Free Bulk Image Compressor" />
    <meta name="twitter:description" content="Compress, resize and convert images in bulk — free, private, and entirely in your browser. No uploads, no sign-up." />
    <meta name="twitter:image" content="https://scalir.org/og.png" />
    <meta name="twitter:image:alt" content="Scalir — free, private, in-browser bulk image compressor" />

    <title>Scalir — Free Bulk Image Compressor (Private, In-Browser)</title>

    <!-- Site-wide structured data (@graph). Per-route FAQPage/BreadcrumbList is injected by setMeta. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://scalir.org/#org",
          "name": "Scalir",
          "url": "https://scalir.org/",
          "logo": "https://scalir.org/favicon-256.png",
          "sameAs": ["https://github.com/therealshxd/scalir"]
        },
        {
          "@type": "WebSite",
          "@id": "https://scalir.org/#website",
          "name": "Scalir",
          "url": "https://scalir.org/",
          "publisher": { "@id": "https://scalir.org/#org" }
        },
        {
          "@type": "WebApplication",
          "@id": "https://scalir.org/#app",
          "name": "Scalir",
          "url": "https://scalir.org/",
          "description": "Free bulk image compressor. Compress, resize and convert images entirely in your browser — JPG, PNG, WebP, AVIF, HEIC, GIF, TIFF and BMP. No uploads, completely private.",
          "applicationCategory": "MultimediaApplication",
          "operatingSystem": "Any (web browser), Windows, Linux",
          "browserRequirements": "Requires a modern web browser",
          "softwareVersion": "1.3.11",
          "featureList": "Bulk image compression, high-quality resizing, target-size compression, before/after preview, WebP and AVIF conversion, HEIC/TIFF/GIF/BMP input, offline PWA and desktop app",
          "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
          "license": "https://opensource.org/licenses/MIT",
          "image": "https://scalir.org/og.png",
          "publisher": { "@id": "https://scalir.org/#org" }
        },
        {
          "@type": "SoftwareSourceCode",
          "name": "Scalir",
          "codeRepository": "https://github.com/therealshxd/scalir",
          "programmingLanguage": ["TypeScript", "Svelte", "Rust"],
          "license": "https://opensource.org/licenses/MIT"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
