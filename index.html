    <title>Scalir — Free Bulk Image Compressor (Private, In-Browser)</title>

    <!-- Structured data: app + FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Scalir",
      "url": "https://scalir.org/",
      "description": "Free bulk image compressor. Compress, resize and convert images entirely in your browser — JPG, PNG, WebP, AVIF, HEIC, GIF, TIFF and BMP. No uploads, completely private.",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "Any (web browser)",
      "browserRequirements": "Requires a modern web browser",
      "softwareVersion": "1.2",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "license": "https://opensource.org/licenses/MIT"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Scalir free?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes — Scalir is completely free and open source under the MIT license. There are no accounts, no watermarks and no paid tier. Self-host it for unlimited use." }
        },
        {
          "@type": "Question",
          "name": "Are my images uploaded to a server?",
          "acceptedAnswer": { "@type": "Answer", "text": "No. Every image is compressed, resized and converted entirely in your browser, on your own device. Nothing is ever uploaded, so your images stay completely private." }
        },
        {
          "@type": "Question",
          "name": "What image formats can I compress?",
          "acceptedAnswer": { "@type": "Answer", "text": "You can bring in JPG, PNG, WebP, AVIF, HEIC/HEIF, GIF, TIFF and BMP, and export to JPEG, PNG, WebP or AVIF — automatically or forced to a format you choose." }
        },
        {
          "@type": "Question",
          "name": "Can I compress images in bulk?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Scalir is built for bulk image compression — drop in a whole folder and it processes everything in parallel across your CPU cores, then hands back a ZIP or saves to a folder." }
        },
        {
          "@type": "Question",
          "name": "Does it work offline?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Scalir is an installable PWA and has a desktop app for Windows and Linux. After the first load it works fully offline." }
        },
        {
          "@type": "Question",
          "name": "Is there a file-size or image limit?",
          "acceptedAnswer": { "@type": "Answer", "text": "The hosted app has a small soft per-session limit as a gentle nudge. The self-hosted and desktop builds are completely unlimited." }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
