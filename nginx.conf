server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed build assets never change — cache them hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Prerendered pages + SPA fallback: serve the file or its directory index
  # (e.g. /features → /features/index.html), otherwise hand off to the app shell.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
