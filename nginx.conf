server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed build assets never change — cache them hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Prerendered pages + SPA fallback. Reference the index file explicitly ($uri/index.html)
  # rather than the directory ($uri/) so nginx serves /features → /features/index.html directly,
  # with no trailing-slash 301 (which would fight the slash-less canonical URLs). Unknown paths
  # fall back to the app shell.
  location / {
    try_files $uri $uri/index.html /index.html;
  }
}
